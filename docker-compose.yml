name: careerlift

services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_http_x__forward_allow__proxies=172.16.0.0/12
      - NEO4J_server_http_x__forward_allow__hosts=localhost,neo4j
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: alpine/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kokoro TTS — the `cpu` and `gpu` profiles are mutually exclusive.
  # Both services share a network alias of `kokoro`, so fastapi's
  # `KOKORO_URL=http://kokoro:8880` resolves regardless of which one is up.
  # Activate at startup by setting COMPOSE_PROFILES in .env, e.g.
  #   COMPOSE_PROFILES=cpu   (default; multi-arch image, ARM64-native on Mac)
  #   COMPOSE_PROFILES=gpu   (NVIDIA CUDA; requires nvidia-container-toolkit)
  # Or on the command line:
  #   docker compose --profile gpu up -d
  # Run scripts/kokoro-detect.sh for a recommendation tailored to the host.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    profiles: ["cpu"]
    ports:
      - "8880:8880"
    volumes:
      - kokoro_data:/app/api/src/models
    networks:
      network:
        aliases: [kokoro]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8880/v1/audio/voices >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  kokoro-gpu:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    profiles: ["gpu"]
    environment:
      - USE_GPU=true
      - PYTHONUNBUFFERED=1
    ports:
      - "8880:8880"
    volumes:
      - kokoro_data:/app/api/src/models
    networks:
      network:
        aliases: [kokoro]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8880/v1/audio/voices >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - KOKORO_URL=http://kokoro:8880
      - KOKORO_VOICE=${KOKORO_VOICE:-af_heart}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - AUTH_JWT_ISSUER=${AUTH_JWT_ISSUER:-careerlift}
      - AUTH_JWT_TTL_HOURS=${AUTH_JWT_TTL_HOURS:-720}
      - BOOTSTRAP_USER_EMAIL=${BOOTSTRAP_USER_EMAIL:-user@careerlift.local}
      - BOOTSTRAP_USER_PASSWORD=${BOOTSTRAP_USER_PASSWORD}
      - BOOTSTRAP_USER_NAME=${BOOTSTRAP_USER_NAME:-user}
      - USAJOBS_API_KEY=${USAJOBS_API_KEY}
      - USAJOBS_EMAIL=${USAJOBS_EMAIL}
      - ADZUNA_APP_ID=${ADZUNA_APP_ID}
      - ADZUNA_APP_KEY=${ADZUNA_APP_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./fastapi:/app
      - fastapi_cache:/root/.cache
      - /var/run/docker.sock:/var/run/docker.sock
      - ./latex:/latex:ro
      - tectonic_cache:/root/.cache/Tectonic
    networks:
      - network
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./fastapi
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./fastapi/requirements.txt

  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET}
      - AUTH_JWT_ISSUER=${AUTH_JWT_ISSUER:-careerlift}
      - AUTH_JWT_TTL_HOURS=${AUTH_JWT_TTL_HOURS:-720}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - MICROSOFT_OAUTH_CLIENT_ID=${MICROSOFT_OAUTH_CLIENT_ID}
      - MICROSOFT_OAUTH_CLIENT_SECRET=${MICROSOFT_OAUTH_CLIENT_SECRET}
      - MICROSOFT_OAUTH_TENANT_ID=${MICROSOFT_OAUTH_TENANT_ID:-common}
      - INTERNAL_API_URL=http://fastapi:8000
    volumes:
      - ./nextjs:/app
      - nextjs_node_modules:/app/node_modules
      - nextjs_next:/app/.next
    networks:
      - network
    depends_on:
      - fastapi
    command: bun run dev
    develop:
      watch:
        - action: sync
          path: ./nextjs
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./nextjs/package.json

networks:
  network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  ollama_data:
  kokoro_data:
  fastapi_cache:
  nextjs_node_modules:
  nextjs_next:
  tectonic_cache:
